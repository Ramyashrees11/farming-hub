<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Farming Hub - User Registration</title>
    <link rel="stylesheet" href="afterreg.css">
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="card-header">
                <div class="header-content">
                    <div class="logo-title">
                        <svg class="logo" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                            <path d="M17,8C8,10 5.9,16.17 3.82,21.34L5.71,22L6.66,19.7C7.14,19.87 7.64,20 8,20C19,20 22,3 22,3C21,5 14,5.25 9,6.25C4,7.25 2,11.5 2,13.5C2,15.5 3.75,17.25 3.75,17.25C7,8 17,8 17,8Z" fill="#4CAF50"/>
                        </svg>
                        <h1>Farming Hub Registration</h1>
                    </div>
                    <p class="subtitle">Please provide your farming details</p>
                </div>
            </div>
            
            <div class="card-body">
                <form id="farmerForm">
                    <div class="form-group">
                        <label for="fullName">Full Name</label>
                        <input type="text" id="fullName" placeholder="Enter your full name" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="location">Location</label>
                        <input type="text" id="location" placeholder="City, State" required>
                    </div>
                    
                    <div class="form-row">
                        <div class="form-group half">
                            <label for="age">Age</label>
                            <input type="number" id="age" placeholder="Your age" min="18" max="120" required>
                        </div>
                        
                        <div class="form-group half">
                            <label for="farmerType">Farmer Type</label>
                            <select id="farmerType" required>
                                <option value="" disabled selected>Select your level</option>
                                <option value="beginner">Beginner</option>
                                <option value="experienced">Experienced</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-row" id="experienceYearsRow" style="display: none;">
                        <div class="form-group full">
                            <label for="experience">Years of Experience</label>
                            <input type="number" id="experience" placeholder="Enter your years of experience" min="1" required>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group full">
                            <label for="cropType">Primary Crop</label>
                            <select id="cropType" required>
                                <option value="" disabled selected>Select crop type</option>
                                <option value="paddy">Paddy</option>
                                <option value="wheat">Wheat</option>
                                <option value="corn">Corn</option>
                                <option value="rice">Rice</option>
                                <option value="soybeans">Soybeans</option>
                                <option value="vegetables">Vegetables</option>
                                <option value="fruits">Fruits</option>
                                <option value="other">Other</option>
                            </select>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label for="acres">Farm Size (Acres)</label>
                        <input type="number" id="acres" placeholder="Size in acres" min="0.1" step="0.1" required>
                    </div>
                    
                    <div class="form-group checkbox">
                        <input type="checkbox" id="organicFarming">
                        <label for="organicFarming">I practice organic farming</label>
                    </div>
                    
                    <div class="button-container">
                        <button type="submit" id="submitBtn" class="btn-primary">Register</button>
                        <button type="reset" class="btn-secondary">Clear Form</button>
                    </div>
                </form>
            </div>
        </div>
        
        <div id="successMessage" class="hidden">
            <div class="success-card">
                <div class="success-icon">✓</div>
                <h2>Registration Successful!</h2>
                <p>Thank you for joining the Farming Hub community.</p>
                <p>We'll connect you with resources specific to your farming needs.</p>
                <button id="newRegistration" class="btn-primary">New Registration</button>
            </div>
        </div>
    </div>
    
    <script src="afterreg.js"></script>
</body>
</html>
