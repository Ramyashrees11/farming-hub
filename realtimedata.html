<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>ESP32-CAM Live</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      body{font-family:system-ui;margin:0;padding:24px;background:#0b0b0b;color:#eee}
      .wrap{max-width:900px;margin:auto}
      .grid{display:grid;gap:16px}
      img, button {border-radius:12px}
      button{padding:10px 14px;border:0;cursor:pointer}
      input{width:100%}
    </style>
  </head>
  <body>
    <div class="wrap grid">
      <h2>ESP32-CAM Live Stream</h2>

      
      <img id="stream" alt="ESP32 Stream"
           src="http://10.111.126.167:81/stream" />

      <div class="grid">
        <button id="snapBtn">Capture Snapshot</button>
        <img id="snap" alt="Snapshot will appear here" />
      </div>

     
      <div class="grid">
        <h3>Send to ML API (optional)</h3>
        <input id="apiUrl" placeholder="https://your-api.example.com/predict" />
        <pre id="result" style="white-space:pre-wrap;background:#121212;padding:12px;border-radius:12px"></pre>
      </div>
    </div>

    <script>
      const BASE = "http://10.111.126.167"; 
      const snapBtn = document.getElementById("snapBtn");
      const snapImg = document.getElementById("snap");
      const apiUrlInput = document.getElementById("apiUrl");
      const result = document.getElementById("result");

      async function capture() {
        const res = await fetch(`${BASE}/capture`, { mode: "cors" });
        const blob = await res.blob();
        const url = URL.createObjectURL(blob);
        snapImg.src = url;
        return blob;
      }

      snapBtn.onclick = async () => {
        try {
          const blob = await capture();
          const api = apiUrlInput.value.trim();
          if (!api) return;

          const fd = new FormData();
          fd.append("file", new File([blob], "frame.jpg", { type: "image/jpeg" }));
          const r = await fetch(api, { method: "POST", body: fd });
          const j = await r.json().catch(async () => ({ raw: await r.text() }));
          result.textContent = JSON.stringify(j, null, 2);
        } catch (e) {
          result.textContent = "Error: " + e.message;
        }
      };
    </script>
  </body>
</html>
